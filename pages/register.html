<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>注册 - 凡人修仙传</title>
<link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
<div class="wrap">
  <h2 class="page-title">注册账号</h2>
  <p class="page-sub">踏入修仙界，留下你的名号</p>

  <div class="card form-card">
    <form id="reg-form">
      <div class="form-group">
        <label>手机号 <span class="req">*</span></label>
        <input class="input" id="phone" placeholder="11 位手机号" maxlength="11">
      </div>
      <div class="form-group">
        <label>邮箱（可选）</label>
        <input class="input" id="email" type="email" placeholder="邮箱（可选）">
      </div>
      <div class="form-group">
        <label>昵称 <span class="req">*</span></label>
        <input class="input" id="nickname" placeholder="你的修仙名号">
      </div>
      <div class="form-group">
        <label>密码 <span class="req">*</span></label>
        <input class="input" id="password" type="password" placeholder="设置密码">
        <div class="form-hint">注册成功后将自动分配唯一 12 位数字 ID，请妥善保存。</div>
      </div>
      <div class="form-msg hidden" id="reg-msg"></div>
      <button class="btn" type="submit" style="width:100%">立即注册</button>
      <p class="form-hint text-center">已有账号？<a href="login.html">前往登录</a></p>
    </form>
  </div>
</div>

<script src="/assets/js/common.js"></script>
<script src="/assets/js/auth.js"></script>
</body>
</html>
