<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>战斗解析 - 凡人修仙传</title>
<link rel="stylesheet" href="/assets/css/style.css">
<style>
  .stats-line { text-align: center; color: var(--ink-soft); font-size: 14px; margin: 6px 0 4px; letter-spacing: 1px; }
  .stats-line .num { color: var(--dark-gold); font-weight: 700; font-size: 18px; }
</style>
</head>
<body>
<div class="wrap" style="position:relative;isolation:isolate">
  <img class="page-banner" src="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=Chinese%20xianxia%20battle%20scene%2C%20flying%20swords%20crossing%2C%20formation%20light%2C%20mountain%20rocks%2C%20ink%20painting%2C%20muted%20bronze&image_size=landscape_4_3" alt="战斗解析画卷" data-parallax="0.3">
  <div class="fog-layer"></div>
  <h2 class="page-title">战斗解析</h2>
  <p class="page-sub">各阶段战斗详介与解析</p>
  <p class="disclaimer text-center">数据量过大，整理可能有误</p>
  <p class="stats-line">共收录 <span class="num" id="total-num">-</span> 条</p>

  <div class="board-grid tx-stone" id="grid" style="padding:22px;border:1px solid var(--line-soft)"></div>

  <div class="card mt-lg">
    <h3>留言</h3>
    <div class="form-group"><label>昵称</label><input class="input" id="b-nick"></div>
    <div class="form-group"><label>留言</label><textarea class="input" id="b-content"></textarea></div>
    <div class="form-msg hidden" id="b-msg"></div>
    <button class="btn" onclick="FR_submitComment({type:'short',board:'battles',nicknameId:'b-nick',contentId:'b-content',msgId:'b-msg',listId:'b-list'})">发表短评</button>
    <h4 class="mt">最新留言</h4>
    <div class="comment-list" id="b-list"></div>
  </div>
</div>

<script src="/assets/js/common.js"></script>
<script src="/assets/js/comments.js"></script>
<script>
  function escapeHtml(s){ return String(s==null?"":s).replace(/[&<>"']/g, function(m){ return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]; }); }
  fetch("/data/battles.json").then(function(r){return r.json();}).then(function(data){
    document.getElementById("total-num").textContent = (data.meta && data.meta.total) || (data.items||[]).length;
    var g = document.getElementById("grid");
  g.innerHTML = (data.items||[]).map(function(c){
    return '<div class="card board-item" style="text-align:left">'+
      '<h3>'+escapeHtml(c.name||'')+'</h3>'+
      '<div class="meta"><span class="tag">'+escapeHtml(c.era||'')+'</span></div>'+
      '<div class="meta">'+escapeHtml('交战方：')+escapeHtml(c.parties||'-')+'</div>'+
      '<div class="meta">'+escapeHtml('结果：')+escapeHtml(c.result||'-')+'</div>'+      '<p class="desc">'+escapeHtml(c.desc||'')+'</p></div>';
  }).join("");
  });
  FR_loadComments("battles", "b-list");
</script>
</body>
</html>
