<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>功法境界 - 凡人修仙传</title>
<link rel="stylesheet" href="/assets/css/style.css">
<style>
  .stats-line { text-align: center; color: var(--text-sub); font-size: 14px; margin: 6px 0 4px; letter-spacing: .08em; }
  .stats-line .num { color: var(--text-title); font-weight: 700; font-size: 18px; font-family: var(--serif-en); }

  /* banner 容器与薄雾 */
  .banner-wrap { position: relative; overflow: hidden; border: 1px solid var(--anjin); margin-bottom: 22px; }
  .banner-wrap .page-banner { margin-bottom: 0; border: 0; display: block; }
  .banner-wrap .fog-layer { opacity: .65; }

  /* 境界卡：山石粗糙颗粒 + 顶部云海分层光（远山阶梯云海感） */
  #grid .board-item {
    background-color: #2a2c30;
    background-image:
      linear-gradient(180deg, rgba(216,220,227,.12) 0%, rgba(216,220,227,.04) 18%, transparent 38%, transparent 70%, rgba(18,26,36,.55) 100%),
      radial-gradient(circle at 18% 22%, rgba(80,76,68,.55), transparent 26%),
      radial-gradient(circle at 78% 14%, rgba(40,42,46,.65), transparent 30%),
      radial-gradient(circle at 62% 78%, rgba(90,84,74,.42), transparent 28%),
      radial-gradient(circle at 30% 88%, rgba(36,38,42,.6), transparent 32%),
      repeating-linear-gradient(118deg, rgba(0,0,0,.05) 0 2px, transparent 2px 7px),
      var(--noise-gray);
    background-blend-mode: normal, normal, normal, normal, normal, soft-light, overlay;
    background-size: auto, auto, auto, auto, auto, auto, 180px 180px;
  }
  #grid .board-item:hover { border-color: var(--jinbian); background-color: #313237; box-shadow: 0 0 0 1px var(--line-strong) inset; }
  #grid .board-item h3 { text-shadow: 0 1px 4px rgba(0,0,0,.5); }
</style>
</head>
<body>
<div class="wrap">
  <div class="banner-wrap" data-parallax="0.10">
    <img class="page-banner" src="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=ancient%20Chinese%20cultivation%20scroll%2C%20sword%20marks%2C%20formation%20diagrams%2C%20rune%20symbols%2C%20ink%20on%20old%20paper%2C%20bronze%20gold%20accents%2C%20atmospheric&image_size=landscape_4_3" alt="古卷剑痕阵图">
    <div class="fog-layer"></div>
  </div>
  <h2 class="page-title">功法境界</h2>
  <p class="page-sub">境界划分 · 灵根体系 · 功法典籍</p>
  <p class="disclaimer text-center">数据量过大，整理可能有误</p>
  <p class="stats-line">共收录 <span class="num" id="total-num">-</span> 条</p>

  <div class="board-grid" id="grid"></div>

  <div class="card mt-lg">
    <h3>留言</h3>
    <div class="form-group"><label>昵称</label><input class="input" id="c-nick"></div>
    <div class="form-group"><label>留言</label><textarea class="input" id="c-content"></textarea></div>
    <div class="form-msg hidden" id="c-msg"></div>
    <button class="btn" onclick="FR_submitComment({type:'short',board:'cultivation',nicknameId:'c-nick',contentId:'c-content',msgId:'c-msg',listId:'c-list'})">发表短评</button>
    <h4 class="mt">最新留言</h4>
    <div class="comment-list" id="c-list"></div>
  </div>
</div>

<script src="/assets/js/common.js"></script>
<script src="/assets/js/comments.js"></script>
<script>
  function escapeHtml(s){ return String(s==null?"":s).replace(/[&<>"']/g, function(m){ return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]; }); }
  fetch("/data/cultivation.json").then(function(r){return r.json();}).then(function(data){
    document.getElementById("total-num").textContent = (data.meta && data.meta.total) || (data.items||[]).length;
    var g = document.getElementById("grid");
  g.innerHTML = (data.items||[]).map(function(c){
    return '<div class="card board-item" style="text-align:left">'+
      '<h3>'+escapeHtml(c.name||'')+'</h3>'+
      '<div class="meta"><span class="tag">'+escapeHtml(c.stage||'')+'</span></div>'+
      '<div class="meta">'+escapeHtml('层级：')+escapeHtml(c.level||'-')+'</div>'+
      '<div class="meta">'+escapeHtml('寿元：')+escapeHtml(c.lifespan||'-')+'</div>'+      '<p class="desc">'+escapeHtml(c.desc||'')+'</p></div>';
  }).join("");
  });
  FR_loadComments("cultivation", "c-list");
</script>
</body>
</html>
