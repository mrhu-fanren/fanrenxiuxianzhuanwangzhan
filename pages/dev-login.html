<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>开发者登录 - 凡人修仙传</title>
<link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
<div class="wrap">
  <h2 class="page-title">开发者入口</h2>
  <p class="page-sub">请输入开发者密码</p>

  <div class="card form-card">
    <form id="dev-form">
      <div class="form-group">
        <label>开发者密码 <span class="req">*</span></label>
        <input class="input" id="dev-password" type="password" placeholder="开发者密码">
      </div>
      <div class="form-msg hidden" id="dev-msg"></div>
      <button class="btn" type="submit" style="width:100%">进入开发者面板</button>
      <p class="form-hint text-center"><a href="index.html">返回首页</a></p>
    </form>
  </div>
</div>

<script src="/assets/js/common.js"></script>
<script src="/assets/js/auth.js"></script>
</body>
</html>
