<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 - 凡人修仙传</title>
<link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
<div class="wrap">
  <h2 class="page-title">道友登录</h2>
  <p class="page-sub">手机号 / 用户 ID / 邮箱 均可登录</p>

  <div class="card form-card">
    <form id="login-form">
      <div class="form-group">
        <label>标识（手机号 / ID / 邮箱）<span class="req">*</span></label>
        <input class="input" id="identifier" placeholder="手机号 / 用户ID / 邮箱">
      </div>
      <div class="form-group">
        <label>密码 <span class="req">*</span></label>
        <input class="input" id="password" type="password" placeholder="密码">
      </div>
      <div class="form-msg hidden" id="login-msg"></div>
      <button class="btn" type="submit" style="width:100%">登录</button>
      <p class="form-hint text-center">还没有账号？<a href="register.html">立即注册</a></p>
    </form>
  </div>
</div>

<script src="/assets/js/common.js"></script>
<script src="/assets/js/auth.js"></script>
</body>
</html>
